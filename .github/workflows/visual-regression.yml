name: Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: "Update screenshot baselines (--update-snapshots)"
        required: false
        default: "false"

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression tests (compare baselines)
        if: ${{ github.event.inputs.update_baselines != 'true' }}
        run: npx playwright test visual-regression --config=playwright.config.ts
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TEST_KEY: ${{ secrets.E2E_TEST_KEY }}

      - name: Update screenshot baselines
        if: ${{ github.event.inputs.update_baselines == 'true' }}
        run: npx playwright test visual-regression --config=playwright.config.ts --update-snapshots
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TEST_KEY: ${{ secrets.E2E_TEST_KEY }}

      - name: Upload baselines (when updating)
        if: ${{ github.event.inputs.update_baselines == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/e2e/visual-regression.spec.ts-snapshots/
          retention-days: 30

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 7

      - name: Upload diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 7
